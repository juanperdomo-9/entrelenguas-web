<!DOCTYPE html>
<html>
<head>

<title>Pago confirmado</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#1c1a18;
color:white;
font-family:Arial, Helvetica, sans-serif;
}

.confirm-box{
max-width:500px;
margin:auto;
background:#2a2422;
padding:40px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.confirm-icon{
font-size:60px;
margin-bottom:15px;
}

.btn-warning{
font-size:18px;
padding:12px;
font-weight:bold;
border-radius:8px;
}

@media (max-width:768px){

.confirm-box{
padding:25px;
margin:10px;
}

h1{
font-size:1.6rem;
}

p{
font-size:0.95rem;
}

}

</style>

</head>

<body>

<div class="container py-5 text-center">

<div class="confirm-box">

<div class="confirm-icon">
🎉
</div>

<h1 class="mb-3">✅ Pago confirmado</h1>

<p>Tu pedido fue pagado correctamente.</p>

<p>📧 En unos minutos recibirás un email con los detalles.</p>

<a href="/" class="btn btn-warning mt-4 w-100">
🍽 Volver al menú
</a>

</div>

</div>

</body>
</html>
