<!DOCTYPE html>
<html lang="en">
<head>

{% load static %}

<meta charset="UTF-8">
<title>Portside - Pick Up</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background-color:#1c1a18;
color:#e8d8c3;
font-family:'Playfair Display',serif;
}

.navbar-custom{
background-color:rgba(28,26,24,0.95);
}

.btn-mezcal{
background-color:#8c2f1b;
color:white;
border-radius:30px;
padding:10px 30px;
border:none;
}

.btn-mezcal:hover{
background-color:#c46a2d;
}

.section-title{
color:#c46a2d;
font-weight:700;
letter-spacing:3px;
margin-bottom:60px;
}

.card-custom{
background-color:#2a2422;
border:none;
border-radius:15px;
overflow:hidden;
}

.card-title{
color:#c46a2d;
font-weight:600;
margin-top:15px;
}

.card-text{
color:#cbb89d;
font-size:0.95rem;
}

.precio{
color:#ffffff;
font-size:1.4rem;
font-weight:700;
margin-top:10px;
}

.toast-carrito{
position:fixed;
bottom:30px;
right:30px;
background:#8c2f1b;
color:white;
padding:15px 25px;
border-radius:8px;
opacity:0;
transform:translateY(20px);
transition:0.3s;
z-index:9999;
}

.toast-carrito.show{
opacity:1;
transform:translateY(0);
}

.whatsapp-float{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
color:white;
font-size:20px;
padding:14px 18px;
border-radius:50px;
text-decoration:none;
box-shadow:0 6px 12px rgba(0,0,0,0.3);
z-index:9999;
}

</style>
</head>

<body>

<a href="https://wa.me/529843158308" class="whatsapp-float" target="_blank">
💬
</a>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
<div class="container">

<a class="navbar-brand" href="/en">PORTSIDE</a>

<div>

<a href="{% url 'cart_en' %}" class="btn btn-mezcal">
🛒 Order (<span id="contador-carrito">{{ cantidad_carrito }}</span>)
</a>

<a href="/" class="btn btn-mezcal">
🇪🇸 Español
</a>

</div>
</div>
</nav>


<div class="container py-5" style="margin-top:100px;">

<div class="text-center">
<h2 class="section-title">WINES</h2>
</div>

<div class="row">

{% for comida in comidas %}

<div class="col-lg-4 col-md-6 col-12 mb-5">

<div class="card card-custom shadow">

{% if comida.imagen %}
<img src="{{ comida.imagen.url }}" class="card-img-top" style="height:350px; object-fit:cover;">
{% endif %}

<div class="card-body text-center">

<h5 class="card-title">{{ comida.nombre }}</h5>

<p class="card-text">{{ comida.descripcion }}</p>

<p class="precio">$ {{ comida.precio }}</p>

<button
class="btn btn-mezcal w-100 mt-3 agregar-carrito"
data-id="{{ comida.id }}">
Add to order
</button>

</div>
</div>
</div>

{% endfor %}

</div>
</div>

<div id="toast-carrito" class="toast-carrito">
Product added to order
</div>

<script>
function getCookie(name){
let cookieValue=null;

if(document.cookie && document.cookie!==''){
const cookies=document.cookie.split(';');

for(let i=0;i<cookies.length;i++){
const cookie=cookies[i].trim();

if(cookie.substring(0,name.length+1)===name+'='){
cookieValue=decodeURIComponent(cookie.substring(name.length+1));
break;
}
}
}

return cookieValue;
}

const csrftoken=getCookie('csrftoken');

document.querySelectorAll(".agregar-carrito").forEach(boton=>{

boton.addEventListener("click",function(){

const comidaId=this.dataset.id;

fetch(`/agregar/${comidaId}/`,{
method:"POST",
headers:{
"X-CSRFToken":csrftoken,
"Content-Type":"application/json"
}
})

.then(response=>response.json())

.then(data=>{

document.getElementById("contador-carrito").innerText=data.cantidad_carrito;

const toast=document.getElementById("toast-carrito");

toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},2000);

});

});

});
</script>

</body>
</html>
