<!DOCTYPE html>
<html>
<head>

<title>Checkout</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#1c1a18;
color:white;
font-family:Arial, Helvetica, sans-serif;
}

.checkout-box{
max-width:600px;
margin:auto;
background:#2a2422;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

label{
margin-bottom:5px;
}

.form-control{
border-radius:8px;
}

.btn-warning{
font-size:18px;
padding:12px;
font-weight:bold;
}

.resumen{
background:#1f1a18;
padding:15px;
border-radius:8px;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="container py-5">

<div class="checkout-box">

<h1 class="mb-4 text-center">🛒 Checkout</h1>

<!-- 💰 SUMMARY -->
<div class="resumen text-center">

<p>Subtotal: $ {{ total }}</p>

<p style="color:#cbb89d;">
Shipping: $ {{ envio }}
</p>

<h4>
Final total: $ {{ total|add:envio }}
</h4>

</div>

<form method="POST">

{% csrf_token %}

<div class="mb-3">
<label>👤 Name</label>
<input type="text" name="nombre" class="form-control" required>
</div>

<div class="mb-3">
<label>📧 Email</label>
<input type="email" name="email" class="form-control" required>
</div>

<div class="mb-3">
<label>📦 Order type</label>

<select name="tipo_pedido" class="form-control" id="tipo_pedido">

<option value="delivery">🚚 Delivery</option>
<option value="retiro">🏪 Pick up</option>

</select>

</div>

<div class="mb-3">
<label>📍 Address (delivery only)</label>
<input type="text" name="direccion" class="form-control" id="direccion">
</div>

<div class="mb-3">

<label>📝 Order notes</label>

<textarea
name="aclaraciones"
class="form-control"
rows="3"
placeholder="Example: no onion, extra spicy, etc">
</textarea>

</div>

<div class="mb-3">
<label>💰 Payment method</label>

<select name="forma_pago" class="form-control">

<option value="efectivo">💵 Pay cash</option>
<option value="mp">💳 Pay online (Mercado Pago)</option>

</select>

</div>

<div class="mb-3 text-center">
  <div class="g-recaptcha" data-sitekey='6LfALq0sAAAAAJyt28Vq_CxGp6B8YKqEmJz9vIt6'></div>
</div>

<button type="submit" class="btn btn-warning w-100">
💳 Confirm order
</button>

</form>

</div>

</div>

<script>

const tipoPedido = document.getElementById("tipo_pedido");
const direccion = document.getElementById("direccion");

function validarDireccion(){
    if(tipoPedido.value === "delivery"){
        direccion.required = true;
    }else{
        direccion.required = false;
    }
}

tipoPedido.addEventListener("change", validarDireccion);
validarDireccion();

</script>

</body>
</html>
