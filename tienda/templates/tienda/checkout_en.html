<!DOCTYPE html>
<html>
<head>

<title>Checkout</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#1c1a18;
color:white;
font-family:Arial, Helvetica, sans-serif;
}
.checkout-box{
max-width:600px;
margin:auto;
background:#2a2422;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
label{ margin-bottom:5px; }
.form-control{ border-radius:8px; }
.btn-warning{
font-size:18px;
padding:12px;
font-weight:bold;
}
.resumen{
background:#1f1a18;
padding:15px;
border-radius:8px;
margin-bottom:20px;
}
</style>

</head>

<body>

<div class="container py-5">
<div class="checkout-box">

<h1 class="mb-4 text-center">🛒 Checkout</h1>

<div class="resumen text-center">
<p>Subtotal: $ {{ total }}</p>
<p style="color:#cbb89d;">Shipping: $ <span id="envio_precio">0</span></p>
<h4>Final total: $ <span id="total_final">{{ total }}</span></h4>
</div>

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label>👤 Name</label>
<input type="text" name="nombre" class="form-control" required>
</div>

<div class="mb-3">
<label>📧 Email</label>
<input type="email" name="email" class="form-control" required>
</div>

<div class="mb-3">
<label>📦 Order type</label>
<select name="tipo_pedido" class="form-control" id="tipo_pedido">
<option value="delivery">🚚 Delivery</option>
<option value="retiro">🏪 Pick up</option>
</select>
</div>

<div class="mb-3">
<label>📍 Address</label>
<input type="text" name="direccion" class="form-control">
</div>

<!-- 🔥 ZONE -->
<div class="mb-3" id="zona_container">
<label>📍 Delivery zone</label>
<select name="zona" id="zona" class="form-control">
<option value="">Select your zone</option>
<option value="centro">Center - $55</option>
<option value="residencial">Residential - $65</option>
<option value="media">Medium zone - $85</option>
<option value="lejana">Far zone - $110</option>
<option value="premium">Premium zone - $130</option>
</select>

<p style="font-size:12px; color:#aaa;">
Delivery zone will be verified. Price may be adjusted if needed.
</p>
</div>

<div class="mb-3">
<label>📝 Notes</label>
<textarea name="aclaraciones" class="form-control"></textarea>
</div>

<div class="mb-3">
<label>💰 Payment method</label>
<select name="forma_pago" class="form-control">
<option value="efectivo">💵 Cash</option>
<option value="mp">💳 Mercado Pago</option>
</select>
</div>

<div class="mb-3 text-center">
<div class="g-recaptcha" data-sitekey='6LfALq0sAAAAAJyt28Vq_CxGp6B8YKqEmJz9vIt6'></div>
</div>

<button type="submit" class="btn btn-warning w-100">
💳 Confirm order
</button>

</form>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>

</div>
</div>

<script>
let subtotal = {{ total }};
const zonaSelect = document.getElementById("zona");
const tipoPedido = document.getElementById("tipo_pedido");
const zonaContainer = document.getElementById("zona_container");

const zonas = {
centro: 55,
residencial: 65,
media: 85,
lejana: 110,
premium: 130
};

function actualizarTotal(){
let envio = zonas[zonaSelect.value] || 0;
document.getElementById("envio_precio").innerText = envio;
document.getElementById("total_final").innerText = subtotal + envio;
}

function toggleZona(){
if(tipoPedido.value === "delivery"){
zonaContainer.style.display = "block";
}else{
zonaContainer.style.display = "none";
zonaSelect.value = "";
actualizarTotal();
}
}

zonaSelect.addEventListener("change", actualizarTotal);
tipoPedido.addEventListener("change", toggleZona);

toggleZona();
</script>

</body>
</html>
