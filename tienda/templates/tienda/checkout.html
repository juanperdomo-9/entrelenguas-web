<!DOCTYPE html>
<html>
<head>

<title>Finalizar compra</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#1c1a18;
color:white;
font-family:Arial, Helvetica, sans-serif;
}
.checkout-box{
max-width:600px;
margin:auto;
background:#2a2422;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
label{ margin-bottom:5px; }
.form-control{ border-radius:8px; }
.btn-warning{
font-size:18px;
padding:12px;
font-weight:bold;
}
.resumen{
background:#1f1a18;
padding:15px;
border-radius:8px;
margin-bottom:20px;
}
</style>

</head>

<body>

<div class="container py-5">
<div class="checkout-box">

<h1 class="mb-4 text-center">🛒 Finalizar compra</h1>

<div class="resumen text-center">
<p>Subtotal: $ {{ total }}</p>
<p style="color:#cbb89d;">Envío: $ <span id="envio_precio">0</span></p>
<h4>Total final: $ <span id="total_final">{{ total }}</span></h4>
</div>

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label>👤 Nombre</label>
<input type="text" name="nombre" class="form-control" required>
</div>

<div class="mb-3">
<label>📧 Email</label>
<input type="email" name="email" class="form-control" required>
</div>

<div class="mb-3">
<label>📦 Tipo de pedido</label>
<select name="tipo_pedido" class="form-control" id="tipo_pedido">
<option value="delivery">🚚 Delivery</option>
<option value="retiro">🏪 Retiro en el local</option>
</select>
</div>

<div class="mb-3">
<label>📍 Dirección</label>
<input type="text" name="direccion" class="form-control">
</div>

<!-- 🔥 ZONA -->
<div class="mb-3" id="zona_container">
<label>📍 Zona de entrega</label>
<select name="zona" id="zona" class="form-control">

<option value="">Seleccionar zona</option>

<option value="zona1">
Zona 1 - $70  
(Centro, Residenciales, Calles 1-2, Aduana)
</option>

<option value="zona2">
Zona 2 - $100  
(Selva, Regatta, Caribbean, Calles 3-6)
</option>

<option value="zona3">
Zona 3 - $130  
(Dreams, UNAM, Calles 7-10, Tren Maya)
</option>

</select>

<p style="font-size:12px; color:#aaa;">
La zona será verificada. El precio puede ajustarse si corresponde.
</p>
</div>

<div class="mb-3">
<label>📝 Aclaraciones</label>
<textarea name="aclaraciones" class="form-control"></textarea>
</div>

<div class="mb-3">
<label>💰 Forma de pago</label>
<select name="forma_pago" class="form-control">
<option value="efectivo">💵 Efectivo</option>
<option value="mp">💳 Mercado Pago</option>
</select>
</div>

<div class="mb-3 text-center">
<div class="g-recaptcha" data-sitekey='6LfALq0sAAAAAJyt28Vq_CxGp6B8YKqEmJz9vIt6'></div>
</div>

<button type="submit" class="btn btn-warning w-100">
💳 Confirmar pedido
</button>

</form>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>

</div>
</div>

<script>
let subtotal = {{ total }};
const zonaSelect = document.getElementById("zona");
const tipoPedido = document.getElementById("tipo_pedido");
const zonaContainer = document.getElementById("zona_container");

const zonas = {
zona1: 70,
zona2: 100,
zona3: 130
};

function actualizarTotal(){
let envio = zonas[zonaSelect.value] || 0;
document.getElementById("envio_precio").innerText = envio;
document.getElementById("total_final").innerText = subtotal + envio;
}

function toggleZona(){
if(tipoPedido.value === "delivery"){
zonaContainer.style.display = "block";
}else{
zonaContainer.style.display = "none";
zonaSelect.value = "";
actualizarTotal();
}
}

zonaSelect.addEventListener("change", actualizarTotal);
tipoPedido.addEventListener("change", toggleZona);

toggleZona();
</script>

</body>
</html>
