<!DOCTYPE html>
<html>
<head>

<title>Finalizar compra</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#1c1a18;
color:white;
font-family:Arial, Helvetica, sans-serif;
}

.checkout-box{
max-width:600px;
margin:auto;
background:#2a2422;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

label{
margin-bottom:5px;
}

.form-control{
border-radius:8px;
}

.btn-warning{
font-size:18px;
padding:12px;
font-weight:bold;
}

.resumen{
background:#1f1a18;
padding:15px;
border-radius:8px;
margin-bottom:20px;
}

@media (max-width:768px){

.checkout-box{
padding:25px;
margin:10px;
}

h1{
font-size:1.6rem;
}

h4{
font-size:1.2rem;
}

}

</style>

</head>

<body>

<div class="container py-5">

<div class="checkout-box">

<h1 class="mb-4 text-center">🛒 Finalizar compra</h1>

<!-- 💰 RESUMEN -->
<div class="resumen text-center">

<p>Subtotal: $ {{ total }}</p>

<p style="color:#cbb89d;">
Envío: $ {{ envio }}
</p>

<h4>
Total final: $ {{ total|add:envio }}
</h4>

</div>

<form method="POST">

{% csrf_token %}

<div class="mb-3">
<label>👤 Nombre</label>
<input type="text" name="nombre" class="form-control" required>
</div>

<div class="mb-3">
<label>📧 Email</label>
<input type="email" name="email" class="form-control" required>
</div>

<div class="mb-3">
<label>📦 Tipo de pedido</label>

<select name="tipo_pedido" class="form-control" id="tipo_pedido">

<option value="delivery">🚚 Delivery</option>
<option value="retiro">🏪 Retiro en el local</option>

</select>

</div>

<div class="mb-3">
<label>📍 Dirección (solo para delivery)</label>
<input type="text" name="direccion" class="form-control" id="direccion">
</div>

<div class="mb-3">

<label>📝 Aclaraciones del pedido</label>

<textarea
name="aclaraciones"
class="form-control"
rows="3"
placeholder="Ej: sin cebolla, extra picante, etc">
</textarea>

</div>

<div class="mb-3">
<label>💰 Forma de pago</label>

<select name="forma_pago" class="form-control">

<option value="efectivo">💵 Pagar en efectivo</option>
<option value="mp">💳 Pagar online (Mercado Pago)</option>

</select>

</div>

<button type="submit" class="btn btn-warning w-100">
💳 Confirmar pedido
</button>

</form>

</div>

</div>

<script>

const tipoPedido = document.getElementById("tipo_pedido");
const direccion = document.getElementById("direccion");

function validarDireccion(){

    if(tipoPedido.value === "delivery"){
        direccion.required = true;
    }else{
        direccion.required = false;
    }

}

tipoPedido.addEventListener("change", validarDireccion);

validarDireccion();

</script>

</body>
</html>
