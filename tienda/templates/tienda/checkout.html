<!DOCTYPE html>
<html>
<head>
<title>Finalizar compra</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:#1c1a18;color:white;">

<div class="container py-5">

<h1 class="mb-4">Finalizar compra</h1>

<h4 class="mb-4">Total: $ {{ total }}</h4>

<form method="POST">

{% csrf_token %}

<div class="mb-3">
<label>Nombre</label>
<input type="text" name="nombre" class="form-control" required>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" name="email" class="form-control" required>
</div>

<div class="mb-3">
<label>Tipo de pedido</label>

<select name="tipo_pedido" class="form-control">

<option value="delivery">Delivery</option>
<option value="retiro">Retiro en el local</option>

</select>

</div>

<div class="mb-3">
<label>Dirección (solo para delivery)</label>
<input type="text" name="direccion" class="form-control">
</div>

<div class="mb-3">
<label>Aclaraciones del pedido</label>

<textarea 
name="aclaraciones" 
class="form-control"
rows="3"
placeholder="Ej: sin cebolla, extra picante, etc">
</textarea>

</div>

<button type="submit" class="btn btn-warning w-100">
Confirmar compra
</button>

</form>

</div>

</body>
</html>
